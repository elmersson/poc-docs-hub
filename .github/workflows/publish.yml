name: publish-docs
on:
  push:
    branches: [main]
  repository_dispatch:
    types: [docs-updated]   # sent by notify-docs-hub.yml in service repos on docs changes
  schedule:
    - cron: "0 5 * * *"     # daily rebuild at 05:00 UTC, safety net for missed dispatches
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Check out service repos
        env:
          GH_TOKEN: ${{ secrets.REPO_READ_TOKEN }}   # fine-grained PAT, contents:read on poc-* repos
        run: |
          mkdir -p checkout
          for repo in poc-shop-frontend poc-orders-service poc-payments-service poc-inventory-service poc-shared-contracts; do
            gh repo clone "${{ github.repository_owner }}/$repo" "checkout/$repo" -- --depth 1
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build site
        env:
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}   # optional; embed.py skips without it
        run: |
          pip install -r requirements.txt
          python scripts/aggregate.py --source ./checkout --github-owner "${{ github.repository_owner }}"
          python scripts/catalog.py --source ./checkout --github-owner "${{ github.repository_owner }}"
          python scripts/crosslink.py --source ./checkout
          python scripts/embed.py
          python scripts/health.py
          python scripts/stats.py
          python scripts/generate_llms_txt.py --base-url "https://${{ github.repository_owner }}.github.io/poc-docs-hub"
          mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
