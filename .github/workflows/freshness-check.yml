name: docs-freshness
on:
  pull_request:
    paths: ["docs/**"]
  schedule:
    - cron: "0 7 1 * *"   # monthly, 1st at 07:00 UTC
  workflow_dispatch:
permissions:
  contents: read
jobs:
  check-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check last_reviewed front-matter
        run: |
          python3 - <<'EOF'
          import re, sys
          from datetime import date, datetime
          from pathlib import Path

          WARN_DAYS, FAIL_DAYS = 183, 365
          RB_WARN, RB_FAIL = 90, 183  # runbooks are audit evidence, stricter SLA
          today, warn, fail, missing = date.today(), [], [], []

          for md in sorted(Path("docs").rglob("*.md")):
              text = md.read_text(encoding="utf-8")
              m = re.search(r"^last_reviewed:\s*(\d{4}-\d{2}-\d{2})", text, re.M)
              if not m:
                  missing.append(str(md)); continue
              age = (today - datetime.strptime(m.group(1), "%Y-%m-%d").date()).days
              rb = "runbooks" in md.parts
              w, f = (RB_WARN, RB_FAIL) if rb else (WARN_DAYS, FAIL_DAYS)
              if age > f: fail.append((str(md), age))
              elif age > w: warn.append((str(md), age))

          for p, a in warn:
              print(f"::warning file={p}::last_reviewed is {a} days old (SLA {WARN_DAYS}). Review and bump it.")
          for p in missing:
              print(f"::warning file={p}::missing last_reviewed front-matter.")
          for p, a in fail:
              print(f"::error file={p}::last_reviewed is {a} days old (hard limit {FAIL_DAYS}).")

          print(f"\nchecked docs/: {len(warn)} past SLA, {len(fail)} past hard limit, {len(missing)} missing front-matter")
          sys.exit(1 if fail else 0)
          EOF
