apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: docs-hub
  description: The docs platform itself - aggregates every repo's docs, builds this site, runs the drift pipeline and the MCP server
  tags: [platform, docs, mkdocs, mcp, pipeline]
  annotations:
    backstage.io/techdocs-ref: dir:.
  links:
    - title: Live site
      url: https://elmersson.github.io/poc-docs-hub/
      icon: dashboard
    - title: Publish pipeline
      url: https://github.com/elmersson/poc-docs-hub/actions/workflows/publish.yml
      icon: analytics
spec:
  type: documentation
  lifecycle: production
  owner: team-platform
  system: demo-shop
  dependsOn:
    - component:shop-frontend
    - component:orders-service
    - component:payments-service
    - component:inventory-service
    - component:shared-contracts
  providesApis: [docs-mcp]
