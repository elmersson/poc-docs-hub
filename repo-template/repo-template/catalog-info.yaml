apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: <SERVICE-NAME>
  description: <ONE-LINE PURPOSE>
  annotations:
    backstage.io/techdocs-ref: dir:.
  links:
    - title: Code coverage
      url: <COVERAGE-URL, e.g. https://codecov.io/gh/ORG/REPO>
      icon: coverage
    - title: Monitoring
      url: <GRAFANA/DATADOG-DASHBOARD-URL>
      icon: dashboard
    - title: Product analytics       # frontend/web components only, remove otherwise
      url: <POSTHOG/AMPLITUDE-URL>
      icon: analytics
spec:
  type: service            # service | library | website | documentation
  lifecycle: production
  owner: <TEAM-NAME>
  system: demo-shop
  dependsOn: []             # e.g. component:shared-contracts
  providesApis: []          # e.g. <service>-api
  consumesApis: []
