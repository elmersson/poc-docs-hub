site_name: Demo Shop Engineering Docs
site_url: https://elmersson.github.io/poc-docs-hub/
site_description: Aggregated documentation for the demo-shop system
repo_url: https://github.com/elmersson/poc-docs-hub
repo_name: elmersson/poc-docs-hub
edit_uri: ""
theme:
  name: material
  icon:
    logo: material/book-open-page-variant
    repo: material/github
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
extra_css:
  - stylesheets/qred.css
plugins:
  - search
  - tags
  - awesome-pages
  - minify:
      minify_html: true
  - swagger-ui-tag
  - rss:
      match_path: ".*"
      date_from_meta:
        as_creation: last_reviewed
        as_update: last_reviewed
  - print-site   # must stay last: one-click whole-site page for PDF export (DORA evidence)
# nav intentional