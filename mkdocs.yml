site_name: Demo Shop Engineering Docs
site_description: Aggregated documentation for the demo-shop system
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - tables
  - toc:
      permalink: true
plugins:
  - search
# nav intentionally omitted: MkDocs auto-generates it from the docs/ tree,
# so aggregated service docs appear without editing this file.
